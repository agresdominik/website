{{ define "main" }}

<h1>{{ .Title }}</h1>

<ul class="postlist">
    {{ range .Pages }}
        <li>
            <div class="post-head">
                <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
                <span class="post-date">{{ .Date | time.Format ":date_medium" }} · ~{{ .ReadingTime }} {{ i18n "minutes" }}</span>
            </div>
            {{ with .Description }}<p class="post-desc">{{ . }}</p>{{ end }}
        </li>
    {{ end }}
</ul>

{{ end }}
